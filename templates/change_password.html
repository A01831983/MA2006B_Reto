<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cambiar contraseña — Casa Monarca</title>
  <style>
    @font-face { font-family: 'DM Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url(https://fonts.gstatic.com/s/dmmono/v16/aFTU7PB1QTsUX8KYthqQBK6PYK0.woff2) format('woff2'); }
    @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 400; font-display: swap; src: url(https://fonts.gstatic.com/s/dmsans/v17/rP2Hp2ywxg089UriCZOIHTWEBlw.woff2) format('woff2'); }
    @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 500; font-display: swap; src: url(https://fonts.gstatic.com/s/dmsans/v17/rP2Hp2ywxg089UriCZOIHTWEBlw.woff2) format('woff2'); }
    @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 600; font-display: swap; src: url(https://fonts.gstatic.com/s/dmsans/v17/rP2Hp2ywxg089UriCZOIHTWEBlw.woff2) format('woff2'); }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-50: #E1F5EE;
      --green-100: #9FE1CB;
      --green-500: #1D9E75;
      --green-700: #0F6E56;
      --green-900: #085041;
      --amber-50: #FAEEDA;
      --amber-700: #BA7517;
      --red-50: #FCEBEB;
      --red-500: #E24B4A;
      --red-700: #A32D2D;
      --gray-50: #F7F6F3;
      --gray-100: #EDECEA;
      --gray-200: #D3D1C7;
      --gray-400: #888780;
      --gray-600: #5F5E5A;
      --gray-800: #2C2C2A;
      --gray-900: #1A1A18;
      --surface: #FFFFFF;
      --surface-2: #F7F6F3;
      --text-primary: #1A1A18;
      --text-secondary: #5F5E5A;
      --text-hint: #888780;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.15);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 20px 48px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --font: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--surface-2);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      width: 460px;
      max-width: 100%;
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      padding: 28px 32px 22px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 40px; height: 40px;
      background: var(--green-500);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(29,158,117,0.3);
    }

    .logo-mark svg { width: 22px; height: 22px; }

    .title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 12.5px;
      color: var(--text-hint);
      margin-top: 4px;
    }

    .notice {
      margin: 16px 32px 0;
      background: var(--amber-50);
      border: 1px solid var(--amber-700);
      border-radius: var(--radius-md);
      padding: 11px 14px;
      font-size: 12.5px;
      color: var(--amber-700);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .notice svg { flex-shrink: 0; margin-top: 1px; }

    .body {
      padding: 20px 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }

    .form-label {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-input {
      font-family: var(--font);
      font-size: 14px;
      padding: 9px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-md);
      background: var(--surface-2);
      color: var(--text-primary);
      outline: none;
      transition: border 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .form-input:focus {
      border-color: var(--green-100);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.1);
      background: var(--surface);
    }

    .form-input.error {
      border-color: var(--red-500);
      box-shadow: 0 0 0 3px rgba(226,75,74,0.1);
    }

    .field-error {
      font-size: 11.5px;
      color: var(--red-700);
      margin-top: 1px;
      display: none;
    }

    .field-error.show { display: block; }

    .password-hint {
      font-size: 11.5px;
      color: var(--text-hint);
      margin-top: 1px;
    }

    .error-message {
      font-size: 12.5px;
      color: var(--red-700);
      background: var(--red-50);
      border: 1px solid var(--red-500);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .error-message.show { display: block; }

    .success-message {
      font-size: 12.5px;
      color: var(--green-900);
      background: var(--green-50);
      border: 1px solid var(--green-100);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .success-message.show { display: block; }

    .btn {
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      padding: 11px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--green-700);
      background: var(--green-500);
      color: white;
      cursor: pointer;
      transition: all 0.12s;
      box-shadow: 0 1px 4px rgba(29,158,117,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .btn:hover:not(:disabled) { background: var(--green-700); }
    .btn:active:not(:disabled) { transform: scale(0.985); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .spinner.show { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      padding: 14px 32px;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-hint);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-link {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .footer-link:hover { color: var(--text-primary); }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.4" fill="none"/>
        <circle cx="10" cy="10" r="2.5" fill="white"/>
        <path d="M10 7.5V10" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="title">Cambia tu contraseña</div>
    <div class="subtitle" id="subtitle">Bienvenido. Antes de continuar, define una contraseña personal.</div>
  </div>

  <div class="notice">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.3"/>
      <path d="M8 4.5v4M8 11v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <div>Tu contraseña actual fue generada automáticamente. Cámbiala por una que sólo tú conozcas.</div>
  </div>

  <div class="body">
    <div id="error-box" class="error-message"></div>
    <div id="success-box" class="success-message"></div>

    <div class="form-group">
      <label class="form-label" for="old-password">Contraseña actual</label>
      <input id="old-password" class="form-input" type="password" autocomplete="current-password"/>
      <span id="old-password-error" class="field-error"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="new-password">Nueva contraseña</label>
      <input id="new-password" class="form-input" type="password" autocomplete="new-password"/>
      <span id="new-password-error" class="field-error"></span>
      <span class="password-hint">Mínimo 8 caracteres.</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm-password">Confirma la nueva contraseña</label>
      <input id="confirm-password" class="form-input" type="password" autocomplete="new-password"/>
      <span id="confirm-password-error" class="field-error"></span>
    </div>

    <button id="submit-btn" class="btn" onclick="doChange()">
      <span id="submit-label">Guardar y continuar</span>
      <span id="spinner" class="spinner"></span>
    </button>
  </div>

  <div class="footer">
    <span id="footer-user">—</span>
    <button class="footer-link" onclick="doLogout()">Cerrar sesión</button>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000/api";

  (function checkAuth() {
    const token = sessionStorage.getItem("auth_token");
    const userJson = sessionStorage.getItem("auth_user");

    if (!token || !userJson) {
      window.location.href = "/login";
      return;
    }

    try {
      const user = JSON.parse(userJson);
      document.getElementById("footer-user").textContent = user.name || user.mail || "Usuario";
    } catch (e) {
      window.location.href = "/login";
    }
  })();

  async function doChange() {
    const oldPwd = document.getElementById("old-password").value;
    const newPwd = document.getElementById("new-password").value;
    const confirmPwd = document.getElementById("confirm-password").value;

    clearAllErrors();

    let hasError = false;

    if (!oldPwd) {
      showFieldError("old-password", "Ingresa tu contraseña actual.");
      hasError = true;
    }

    if (!newPwd) {
      showFieldError("new-password", "Ingresa la nueva contraseña.");
      hasError = true;
    } else if (newPwd.length < 8) {
      showFieldError("new-password", "La nueva contraseña debe tener al menos 8 caracteres.");
      hasError = true;
    } else if (newPwd === oldPwd) {
      showFieldError("new-password", "La nueva contraseña debe ser distinta a la actual.");
      hasError = true;
    }

    if (!confirmPwd) {
      showFieldError("confirm-password", "Confirma la nueva contraseña.");
      hasError = true;
    } else if (newPwd && newPwd !== confirmPwd) {
      showFieldError("confirm-password", "Las contraseñas no coinciden.");
      hasError = true;
    }

    if (hasError) return;

    const token = sessionStorage.getItem("auth_token");
    if (!token) {
      window.location.href = "/login";
      return;
    }

    const submitBtn = document.getElementById("submit-btn");
    const submitLabel = document.getElementById("submit-label");
    const spinner = document.getElementById("spinner");

    submitBtn.disabled = true;
    submitLabel.textContent = "Guardando...";
    spinner.classList.add("show");

    try {
      const res = await fetch(API + "/auth/change-password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ old_password: oldPwd, new_password: newPwd })
      });

      const data = await res.json();

      if (!res.ok) {
        if (res.status === 401) {
          if ((data.message || "").toLowerCase().includes("old password")) {
            showFieldError("old-password", "La contraseña actual es incorrecta.");
          } else {
            sessionStorage.clear();
            window.location.href = "/login";
          }
          return;
        }
        showError(data.message || "Error al cambiar la contraseña.");
        return;
      }

      showSuccess("Contraseña actualizada. Redirigiendo...");
      setTimeout(() => { window.location.href = "/"; }, 1200);

    } catch (e) {
      showError("No se pudo conectar con el servidor.");
      console.error(e);
    } finally {
      submitBtn.disabled = false;
      submitLabel.textContent = "Guardar y continuar";
      spinner.classList.remove("show");
    }
  }

  function doLogout() {
    sessionStorage.clear();
    window.location.href = "/login";
  }

  function showFieldError(inputId, msg) {
    document.getElementById(inputId).classList.add("error");
    const span = document.getElementById(inputId + "-error");
    span.textContent = msg;
    span.classList.add("show");
  }

  function showError(msg) {
    const box = document.getElementById("error-box");
    box.textContent = msg;
    box.classList.add("show");
    document.getElementById("success-box").classList.remove("show");
  }

  function showSuccess(msg) {
    const box = document.getElementById("success-box");
    box.textContent = msg;
    box.classList.add("show");
    document.getElementById("error-box").classList.remove("show");
  }

  function clearAllErrors() {
    document.getElementById("error-box").classList.remove("show");
    document.getElementById("success-box").classList.remove("show");
    ["old-password", "new-password", "confirm-password"].forEach(id => {
      document.getElementById(id).classList.remove("error");
      const span = document.getElementById(id + "-error");
      if (span) { span.textContent = ""; span.classList.remove("show"); }
    });
  }

  ["old-password", "new-password", "confirm-password"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", (e) => {
      if (e.key === "Enter") doChange();
    });
  });
</script>

</body>
</html>
