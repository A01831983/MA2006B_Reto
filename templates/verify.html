<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verificación de firma — Casa Monarca</title>
  <style>
    @font-face { font-family:'DM Sans'; font-style:normal; font-weight:400; font-display:swap;
      src:url(https://fonts.gstatic.com/s/dmsans/v17/rP2Hp2ywxg089UriCZOIHTWEBlw.woff2) format('woff2'); }
    @font-face { font-family:'DM Sans'; font-style:normal; font-weight:600; font-display:swap;
      src:url(https://fonts.gstatic.com/s/dmsans/v17/rP2Hp2ywxg089UriCZOIHTWEBlw.woff2) format('woff2'); }
    @font-face { font-family:'DM Mono'; font-style:normal; font-weight:400; font-display:swap;
      src:url(https://fonts.gstatic.com/s/dmmono/v16/aFTU7PB1QTsUX8KYthqQBK6PYK0.woff2) format('woff2'); }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --green-50:#E1F5EE; --green-500:#1D9E75; --green-700:#0F6E56; --green-900:#085041;
      --red-50:#FCEBEB;   --red-500:#E24B4A;   --red-700:#A32D2D;   --red-900:#791F1F;
      --amber-50:#FAEEDA; --amber-700:#BA7517;
      --gray-50:#F7F6F3;  --gray-100:#EDECEA;  --gray-200:#D3D1C7;
      --gray-400:#888780; --gray-600:#5F5E5A;  --gray-900:#1A1A18;
      --surface:#FFFFFF;
      --border:rgba(0,0,0,0.10);
      --shadow-lg:0 20px 48px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      --font:'DM Sans',sans-serif;
      --font-mono:'DM Mono',monospace;
    }
    body {
      font-family:var(--font);
      background:var(--gray-50);
      color:var(--gray-900);
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
      padding:40px 20px 60px;
    }

    /* ── HEADER ── */
    .page-header {
      display:flex; align-items:center; gap:12px;
      margin-bottom:32px;
    }
    .logo-mark {
      width:40px; height:40px; border-radius:11px;
      background:var(--green-500);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 10px rgba(29,158,117,0.35);
      flex-shrink:0;
    }
    .logo-mark svg { width:22px; height:22px; }
    .page-brand { font-size:15px; font-weight:600; color:var(--gray-900); }
    .page-brand-sub { font-size:12px; color:var(--gray-400); margin-top:1px; }

    /* ── SPINNER ── */
    .spinner-wrap {
      display:flex; flex-direction:column; align-items:center; gap:16px;
      padding:60px 0;
    }
    .spinner {
      width:36px; height:36px;
      border:3px solid var(--gray-200);
      border-top-color:var(--green-500);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner-label { font-size:13px; color:var(--gray-400); }

    /* ── RESULT CARD ── */
    .result-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow-lg);
      width:100%; max-width:580px;
      overflow:hidden;
      animation:fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── BANNER ── */
    .result-banner {
      padding:28px 28px 24px;
      display:flex; align-items:flex-start; gap:16px;
    }
    .result-banner.valid   { background:var(--green-900); color:#fff; }
    .result-banner.invalid { background:var(--red-900);   color:#fff; }
    .result-banner.error   { background:#2C2C2A;           color:#fff; }

    .banner-icon {
      width:48px; height:48px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; margin-top:2px;
    }
    .valid   .banner-icon { background:rgba(255,255,255,0.12); }
    .invalid .banner-icon { background:rgba(255,255,255,0.12); }
    .error   .banner-icon { background:rgba(255,255,255,0.08); }

    .banner-title {
      font-size:20px; font-weight:700; letter-spacing:-0.01em;
      margin-bottom:4px;
    }
    .valid   .banner-title { color:#9FE1CB; }
    .invalid .banner-title { color:#FFBDBC; }
    .error   .banner-title { color:#D3D1C7; }

    .banner-sub  { font-size:13px; opacity:0.8; line-height:1.5; }

    /* ── META ROWS ── */
    .meta-section { padding:20px 28px; border-bottom:1px solid var(--border); }
    .meta-section:last-child { border-bottom:none; }

    .meta-section-label {
      font-size:10px; font-weight:600; letter-spacing:.07em;
      text-transform:uppercase; color:var(--gray-400);
      margin-bottom:10px; padding-bottom:6px;
      border-bottom:1px solid var(--border);
    }
    .meta-row {
      display:flex; justify-content:space-between; align-items:baseline;
      padding:6px 0; gap:16px;
    }
    .meta-label { font-size:12.5px; color:var(--gray-600); flex-shrink:0; }
    .meta-val   { font-size:12.5px; font-family:var(--font-mono); color:var(--gray-900);
                  text-align:right; word-break:break-all; }

    /* ── PILL BADGES ── */
    .pill {
      display:inline-flex; align-items:center; gap:5px;
      padding:3px 9px; border-radius:99px; font-size:11.5px; font-weight:600;
    }
    .pill-ok  { background:var(--green-50); color:var(--green-700); }
    .pill-bad { background:var(--red-50);   color:var(--red-700); }
    .pill-warn{ background:var(--amber-50); color:var(--amber-700); }

    /* ── ONE-TIME WARNING ── */
    .one-time-note {
      margin:0 28px 20px;
      background:var(--amber-50);
      border:1px solid #EF9F27;
      border-radius:8px;
      padding:10px 14px;
      font-size:12px; color:var(--amber-700);
      display:flex; gap:8px; align-items:flex-start;
    }

    /* ── FOOTER ── */
    .card-footer {
      background:var(--gray-50);
      border-top:1px solid var(--border);
      padding:14px 28px;
      display:flex; justify-content:space-between; align-items:center;
      font-size:12px; color:var(--gray-400);
    }
  </style>
</head>
<body>

<div class="page-header">
  <div class="logo-mark">
    <svg viewBox="0 0 20 20" fill="none">
      <path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.4" fill="none"/>
      <circle cx="10" cy="10" r="2.5" fill="white"/>
      <path d="M10 7.5V10" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
  </div>
  <div>
    <div class="page-brand">Casa Monarca</div>
    <div class="page-brand-sub">Verificación de firma digital</div>
  </div>
</div>

<!-- Estado de carga -->
<div id="loading" class="spinner-wrap">
  <div class="spinner"></div>
  <div class="spinner-label">Verificando firma criptográfica…</div>
</div>

<!-- Resultado -->
<div id="result-card" class="result-card" style="display:none"></div>

<script>
(function() {
  var API_BASE = "http://localhost:8000/api";

  // Extraer token de la URL: /verify/<token>
  var parts = window.location.pathname.split('/');
  var token = parts[parts.length - 1] || '';

  if (!token) {
    showError('Token no encontrado en la URL.');
    return;
  }

  fetch(API_BASE + "/public/verify/" + encodeURIComponent(token), {
    method: 'GET',
    headers: { 'Content-Type': 'application/json' }
  })
  .then(function(res) {
    if (res.status === 410) {
      return res.json().then(function(d) {
        renderResult(null, d.message || 'Este enlace de verificación ya fue utilizado o ha expirado.', 'used');
      });
    }
    if (res.status === 404) {
      renderResult(null, 'Token de verificación no encontrado.', 'notfound');
      return;
    }
    if (!res.ok) {
      return res.text().then(function(t) { renderResult(null, t, 'error'); });
    }
    return res.json().then(function(data) { renderResult(data, null, 'ok'); });
  })
  .catch(function(e) {
    renderResult(null, 'No se pudo conectar con el servidor. Verifica que esté activo.', 'error');
  });

  function renderResult(data, errorMsg, type) {
    document.getElementById('loading').style.display = 'none';
    var card = document.getElementById('result-card');
    card.style.display = '';

    // ── Caso: token ya usado / expirado / no encontrado ──
    if (type === 'used' || type === 'notfound' || type === 'error') {
      var bannerTitle = type === 'used'     ? 'Enlace ya utilizado'
                      : type === 'notfound' ? 'Enlace no encontrado'
                      :                       'Error de verificación';
      var icon = type === 'used'
        ? '<svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 8v5M12 16.5v.5" stroke="#FFBDBC" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="9.5" stroke="#FFBDBC" stroke-width="1.4"/></svg>'
        : '<svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M5 5l14 14M19 5L5 19" stroke="#D3D1C7" stroke-width="1.8" stroke-linecap="round"/></svg>';
      card.innerHTML =
        '<div class="result-banner ' + (type === 'used' ? 'invalid' : 'error') + '">' +
          '<div class="banner-icon">' + icon + '</div>' +
          '<div>' +
            '<div class="banner-title">' + bannerTitle + '</div>' +
            '<div class="banner-sub">' + (errorMsg || '') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="card-footer">' +
          '<span>Casa Monarca &mdash; Sistema de Firma Digital</span>' +
        '</div>';
      return;
    }

    // ── Caso: resultado criptográfico ──
    var sigOk  = data.message_ok === true;
    var certOk = data.certificate_ok === true;
    var allOk  = sigOk && certOk;

    var bannerCls   = allOk ? 'valid' : 'invalid';
    var bannerTitle = allOk ? 'Firma digital válida' : 'Verificación fallida';
    var bannerSub   = allOk
      ? 'La integridad del mensaje y el certificado del firmante han sido confirmados.'
      : 'La firma del mensaje no es válida o el certificado del firmante tiene un problema.';

    var iconValid = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="#9FE1CB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    var iconInvalid = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="#FFBDBC" stroke-width="2" stroke-linecap="round"/></svg>';

    var sigPill  = sigOk  ? '<span class="pill pill-ok">Firma válida</span>'  : '<span class="pill pill-bad">Firma inválida</span>';
    var certPill = certOk ? '<span class="pill pill-ok">Cert. vigente</span>' : '<span class="pill pill-bad">Cert. problemático</span>';

    var fp = data.fingerprint || '';
    var fpDisplay = fp.length > 32
      ? fp.slice(0, 8) + ' … ' + fp.slice(-8)
      : fp;

    card.innerHTML =
      // Banner
      '<div class="result-banner ' + bannerCls + '">' +
        '<div class="banner-icon">' + (allOk ? iconValid : iconInvalid) + '</div>' +
        '<div>' +
          '<div class="banner-title">' + bannerTitle + '</div>' +
          '<div class="banner-sub">' + bannerSub + '</div>' +
        '</div>' +
      '</div>' +

      // Advertencia de un solo uso
      '<div class="one-time-note">' +
        '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:1px">' +
          '<circle cx="8" cy="8" r="6.5" stroke="#BA7517" stroke-width="1.3"/>' +
          '<path d="M8 5v4M8 10.5v.5" stroke="#BA7517" stroke-width="1.3" stroke-linecap="round"/>' +
        '</svg>' +
        'Este enlace es de <strong>un solo uso</strong>. Ya ha sido consumido — no podrá accederse de nuevo con el mismo enlace.' +
      '</div>' +

      // Estado de verificación
      '<div class="meta-section">' +
        '<div class="meta-section-label">Estado de verificación</div>' +
        '<div class="meta-row"><span class="meta-label">Integridad del mensaje</span>' + sigPill  + '</div>' +
        '<div class="meta-row"><span class="meta-label">Certificado firmante</span>'   + certPill + '</div>' +
        '<div class="meta-row"><span class="meta-label">Resultado</span><span class="meta-val">' + esc(data.details) + '</span></div>' +
      '</div>' +

      // Metadatos del mensaje
      '<div class="meta-section">' +
        '<div class="meta-section-label">Metadatos del mensaje</div>' +
        '<div class="meta-row"><span class="meta-label">Asunto</span><span class="meta-val">'     + esc(data.subject)    + '</span></div>' +
        '<div class="meta-row"><span class="meta-label">Destinatario</span><span class="meta-val">' + esc(data.recipient)  + '</span></div>' +
        '<div class="meta-row"><span class="meta-label">Firmado por (UID)</span><span class="meta-val">' + esc(data.signer_uid) + '</span></div>' +
        '<div class="meta-row"><span class="meta-label">Fecha de creación</span><span class="meta-val">' + fmtDate(data.created_at) + '</span></div>' +
      '</div>' +

      // Certificado
      '<div class="meta-section">' +
        '<div class="meta-section-label">Certificado X.509 (SHA-256)</div>' +
        '<div class="meta-row" style="flex-wrap:wrap">' +
          '<span class="meta-label">Fingerprint</span>' +
          '<span class="meta-val" title="' + esc(fp) + '">' + esc(fpDisplay) + '</span>' +
        '</div>' +
      '</div>' +

      // Footer
      '<div class="card-footer">' +
        '<span>Casa Monarca &mdash; Sistema de Firma Digital</span>' +
      '</div>';
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleString('es-MX', {
        year:'numeric', month:'short', day:'numeric',
        hour:'2-digit', minute:'2-digit', hour12:false,
        timeZone: 'America/Mexico_City'
      });
    } catch(e) { return iso; }
  }
})();
</script>
</body>
</html>
